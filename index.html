<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Platinum Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Barlow:wght@300;400;500&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0f13;
    --surface: #16181f;
    --surface2: #1e2029;
    --surface3: #252833;
    --border: #2e3140;
    --gold: #f0c040;
    --gold-dim: #a07c20;
    --silver: #c0c8d8;
    --bronze: #cd7f45;
    --platinum: #e8d5ff;
    --blue: #0070d1;
    --blue-bright: #1a8fff;
    --green: #30d060;
    --red: #e84060;
    --text: #e8eaf0;
    --text-dim: #808498;
    --text-faint: #4a4e60;
    --radius: 12px;
    --radius-sm: 8px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Barlow', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* NOISE OVERLAY */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 1000;
    opacity: 0.5;
  }

  /* HEADER */
  header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(14,15,19,0.92);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 64px;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .logo-icon {
    width: 36px;
    height: 36px;
    background: linear-gradient(135deg, #c0a0ff, #e8d5ff);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    box-shadow: 0 0 20px rgba(192,160,255,0.3);
  }

  .logo-text {
    font-family: 'Rajdhani', sans-serif;
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text);
  }

  .logo-text span {
    color: var(--platinum);
  }

  .header-stats {
    display: flex;
    gap: 24px;
    align-items: center;
  }

  .stat-pill {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 100px;
    padding: 6px 14px;
    font-size: 13px;
  }

  .stat-pill .val {
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    font-size: 16px;
    color: var(--gold);
  }

  .stat-pill .lbl {
    color: var(--text-dim);
    font-size: 12px;
  }

  /* MAIN */
  main {
    max-width: 1400px;
    margin: 0 auto;
    padding: 32px 24px;
  }

  /* TOOLBAR */
  .toolbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 28px;
    flex-wrap: wrap;
    gap: 12px;
  }

  .toolbar-left {
    display: flex;
    gap: 8px;
  }

  .filter-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text-dim);
    border-radius: 100px;
    padding: 7px 16px;
    font-family: 'Barlow', sans-serif;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .filter-btn:hover, .filter-btn.active {
    background: var(--surface3);
    border-color: var(--blue-bright);
    color: var(--text);
  }

  .filter-btn.active {
    background: rgba(26,143,255,0.12);
    border-color: var(--blue-bright);
    color: var(--blue-bright);
  }

  .add-btn {
    background: linear-gradient(135deg, #0070d1, #1a8fff);
    border: none;
    color: #fff;
    border-radius: var(--radius-sm);
    padding: 10px 20px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 8px;
    box-shadow: 0 4px 16px rgba(0,112,209,0.3);
  }

  .add-btn:hover {
    transform: translateY(-1px);
    box-shadow: 0 6px 20px rgba(0,112,209,0.4);
  }

  /* PROGRESS BAR OVERVIEW */
  .overview-bar {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px 24px;
    margin-bottom: 28px;
    display: flex;
    align-items: center;
    gap: 24px;
  }

  .overview-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-faint);
    white-space: nowrap;
  }

  .overview-track {
    flex: 1;
    height: 8px;
    background: var(--surface3);
    border-radius: 100px;
    overflow: hidden;
    position: relative;
  }

  .overview-fill {
    height: 100%;
    background: linear-gradient(90deg, #0070d1, #c0a0ff, #e8d5ff);
    border-radius: 100px;
    transition: width 0.8s cubic-bezier(0.4,0,0.2,1);
  }

  .overview-pct {
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    font-size: 18px;
    color: var(--platinum);
    white-space: nowrap;
  }

  /* GAME GRID */
  .game-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 20px;
  }

  /* GAME CARD */
  .game-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
    position: relative;
    animation: cardIn 0.4s ease both;
  }

  @keyframes cardIn {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .game-card:hover {
    border-color: rgba(26,143,255,0.4);
    transform: translateY(-3px);
    box-shadow: 0 12px 40px rgba(0,0,0,0.4);
  }

  .game-card.platted {
    border-color: rgba(232,213,255,0.25);
  }

  .game-card.platted:hover {
    border-color: rgba(232,213,255,0.5);
    box-shadow: 0 12px 40px rgba(192,160,255,0.15);
  }

  /* Card accent strip */
  .card-accent {
    height: 3px;
    background: linear-gradient(90deg, var(--blue), transparent);
  }

  .game-card.platted .card-accent {
    background: linear-gradient(90deg, #c0a0ff, #e8d5ff, transparent);
  }

  /* Card header */
  .card-header {
    padding: 16px 18px 12px;
    display: flex;
    align-items: flex-start;
    gap: 14px;
  }

  .game-thumb {
    width: 52px;
    height: 52px;
    border-radius: 10px;
    background: var(--surface3);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    flex-shrink: 0;
    border: 1px solid var(--border);
    position: relative;
    overflow: hidden;
  }

  .game-thumb img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 9px;
  }

  .card-title-area {
    flex: 1;
    min-width: 0;
  }

  .game-title {
    font-family: 'Rajdhani', sans-serif;
    font-size: 17px;
    font-weight: 700;
    letter-spacing: 0.5px;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    line-height: 1.2;
    margin-bottom: 4px;
  }

  .game-meta {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }

  .badge {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 2px 8px;
    border-radius: 4px;
  }

  .diff-easy { background: rgba(48,208,96,0.15); color: #50e080; border: 1px solid rgba(48,208,96,0.25); }
  .diff-medium { background: rgba(240,192,64,0.15); color: #f0c040; border: 1px solid rgba(240,192,64,0.25); }
  .diff-hard { background: rgba(232,64,96,0.15); color: #f06080; border: 1px solid rgba(232,64,96,0.25); }
  .diff-very-hard { background: rgba(192,64,232,0.15); color: #d080ff; border: 1px solid rgba(192,64,232,0.25); }

  .time-badge {
    font-size: 12px;
    color: var(--text-dim);
    display: flex;
    align-items: center;
    gap: 4px;
  }

  /* Card body */
  .card-body {
    padding: 0 18px 14px;
  }

  /* Trophy counts */
  .trophy-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 12px;
  }

  .trophy-count {
    display: flex;
    align-items: center;
    gap: 5px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px;
    font-weight: 600;
  }

  .trophy-icon { font-size: 14px; }
  .t-plat { color: var(--platinum); }
  .t-gold { color: var(--gold); }
  .t-silver { color: var(--silver); }
  .t-bronze { color: var(--bronze); }

  /* Progress */
  .progress-area {
    margin-bottom: 14px;
  }

  .progress-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 6px;
  }

  .progress-label {
    font-size: 12px;
    color: var(--text-faint);
    font-family: 'Barlow Condensed', sans-serif;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .progress-pct {
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    font-size: 15px;
    color: var(--text-dim);
  }

  .progress-track {
    height: 6px;
    background: var(--surface3);
    border-radius: 100px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    border-radius: 100px;
    background: linear-gradient(90deg, var(--blue), var(--blue-bright));
    transition: width 0.8s cubic-bezier(0.4,0,0.2,1);
  }

  .game-card.platted .progress-fill {
    background: linear-gradient(90deg, #c0a0ff, #e8d5ff);
  }

  .progress-pct.done { color: var(--platinum); }

  /* Divider */
  .card-divider {
    height: 1px;
    background: var(--border);
    margin: 0 -18px 14px;
  }

  /* Guide links */
  .guide-links {
    display: flex;
    gap: 8px;
  }

  .guide-link {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 12px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border);
    text-decoration: none;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    color: var(--text-dim);
    background: var(--surface2);
    transition: all 0.2s;
    flex: 1;
    justify-content: center;
  }

  .guide-link:hover {
    background: var(--surface3);
    border-color: var(--blue-bright);
    color: var(--blue-bright);
    text-decoration: none;
  }

  .guide-link.psn { --accent: #00439c; }
  .guide-link.ppyx { --accent: #d04020; }

  /* Card footer */
  .card-footer {
    padding: 10px 18px;
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--surface2);
  }

  .card-status {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 12px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .status-not-started { color: var(--text-faint); }
  .status-in-progress { color: var(--blue-bright); }
  .status-platted { color: var(--platinum); }

  .card-actions {
    display: flex;
    gap: 6px;
  }

  .action-btn {
    background: var(--surface3);
    border: 1px solid var(--border);
    color: var(--text-dim);
    border-radius: 6px;
    padding: 5px 10px;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'Barlow', sans-serif;
  }

  .action-btn:hover {
    background: var(--border);
    color: var(--text);
  }

  .action-btn.edit-btn:hover { border-color: var(--blue-bright); color: var(--blue-bright); }
  .action-btn.del-btn:hover { border-color: var(--red); color: var(--red); }

  /* PLATTED BADGE */
  .plat-crown {
    position: absolute;
    top: -2px;
    right: -2px;
    background: linear-gradient(135deg, #c0a0ff, #e8d5ff);
    border-radius: 0 9px 0 9px;
    padding: 3px 6px;
    font-size: 11px;
    line-height: 1;
  }

  /* MODAL */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    backdrop-filter: blur(8px);
    z-index: 500;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s;
  }

  .modal-overlay.open {
    opacity: 1;
    pointer-events: all;
  }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    width: 100%;
    max-width: 520px;
    max-height: 90vh;
    overflow-y: auto;
    transform: translateY(20px);
    transition: transform 0.25s cubic-bezier(0.4,0,0.2,1);
  }

  .modal-overlay.open .modal {
    transform: translateY(0);
  }

  .modal-header {
    padding: 20px 24px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
  }

  .modal-title {
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    font-size: 20px;
    letter-spacing: 1px;
  }

  .modal-close {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text-dim);
    width: 32px;
    height: 32px;
    border-radius: 8px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    transition: all 0.2s;
  }

  .modal-close:hover { background: var(--surface3); color: var(--text); }

  .modal-body {
    padding: 20px 24px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }

  .form-group {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .form-group.full { grid-column: 1 / -1; }

  label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 12px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--text-faint);
  }

  input, select, textarea {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: var(--radius-sm);
    padding: 10px 12px;
    font-family: 'Barlow', sans-serif;
    font-size: 14px;
    transition: border-color 0.2s;
    width: 100%;
  }

  input:focus, select:focus, textarea:focus {
    outline: none;
    border-color: var(--blue-bright);
  }

  select option { background: var(--surface2); }
  textarea { resize: vertical; min-height: 60px; }

  .trophy-inputs {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
  }

  .trophy-input-group {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .trophy-input-label {
    font-size: 11px;
    text-align: center;
    color: var(--text-faint);
  }

  .trophy-input-label span { font-size: 16px; }

  .trophy-input-group input {
    text-align: center;
    padding: 8px 4px;
  }

  /* Progress slider */
  .slider-group {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  input[type="range"] {
    padding: 0;
    -webkit-appearance: none;
    height: 6px;
    border-radius: 100px;
    background: var(--surface3);
    border: none;
    flex: 1;
  }

  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: var(--blue-bright);
    cursor: pointer;
    border: 2px solid var(--bg);
    box-shadow: 0 0 8px rgba(26,143,255,0.5);
  }

  .slider-val {
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    font-size: 16px;
    color: var(--blue-bright);
    min-width: 40px;
    text-align: right;
  }

  .modal-footer {
    padding: 16px 24px;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: flex-end;
    gap: 10px;
  }

  .btn-cancel {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text-dim);
    border-radius: var(--radius-sm);
    padding: 10px 20px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-cancel:hover { background: var(--surface3); color: var(--text); }

  .btn-save {
    background: linear-gradient(135deg, #0070d1, #1a8fff);
    border: none;
    color: #fff;
    border-radius: var(--radius-sm);
    padding: 10px 24px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 4px 12px rgba(0,112,209,0.3);
  }

  .btn-save:hover { transform: translateY(-1px); box-shadow: 0 6px 16px rgba(0,112,209,0.4); }

  /* EMPTY STATE */
  .empty-state {
    grid-column: 1 / -1;
    text-align: center;
    padding: 80px 24px;
  }

  .empty-icon { font-size: 64px; margin-bottom: 16px; opacity: 0.3; }

  .empty-title {
    font-family: 'Rajdhani', sans-serif;
    font-size: 24px;
    font-weight: 700;
    color: var(--text-dim);
    margin-bottom: 8px;
  }

  .empty-sub { font-size: 14px; color: var(--text-faint); }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 100px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--surface3); }

  @media (max-width: 600px) {
    .header-stats { display: none; }
    .game-grid { grid-template-columns: 1fr; }
    .form-row { grid-template-columns: 1fr; }
    .trophy-inputs { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">🏆</div>
    <div class="logo-text"><span>Platinum</span> Tracker</div>
  </div>
  <div class="header-stats">
    <div class="stat-pill">
      <span class="val" id="stat-platted">0</span>
      <span class="lbl">Platted</span>
    </div>
    <div class="stat-pill">
      <span class="val" id="stat-total">0</span>
      <span class="lbl">Total Games</span>
    </div>
  </div>
</header>

<main>
  <div class="toolbar">
    <div class="toolbar-left">
      <button class="filter-btn active" onclick="setFilter('all')">All</button>
      <button class="filter-btn" onclick="setFilter('in-progress')">In Progress</button>
      <button class="filter-btn" onclick="setFilter('not-started')">Not Started</button>
      <button class="filter-btn" onclick="setFilter('platted')">Platted 🏆</button>
    </div>
    <button class="add-btn" onclick="openAddModal()">
      <span>+</span> Add Game
    </button>
  </div>

  <div class="overview-bar">
    <span class="overview-label">Year Progress</span>
    <div class="overview-track">
      <div class="overview-fill" id="overview-fill" style="width:0%"></div>
    </div>
    <span class="overview-pct" id="overview-pct">0 / 0</span>
  </div>

  <div class="game-grid" id="game-grid"></div>
</main>

<!-- MODAL -->
<div class="modal-overlay" id="modal" onclick="handleOverlayClick(event)">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modal-title">Add Game</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group full">
        <label>Game Title</label>
        <input type="text" id="f-title" placeholder="e.g. God of War Ragnarök">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Difficulty</label>
          <select id="f-diff">
            <option value="easy">Easy (1-2/10)</option>
            <option value="medium" selected>Medium (3-5/10)</option>
            <option value="hard">Hard (6-8/10)</option>
            <option value="very-hard">Very Hard (9-10/10)</option>
          </select>
        </div>
        <div class="form-group">
          <label>Est. Time</label>
          <input type="text" id="f-time" placeholder="e.g. 40-50 hrs">
        </div>
      </div>
      <div class="form-group full">
        <label>Trophy Counts</label>
        <div class="trophy-inputs">
          <div class="trophy-input-group">
            <div class="trophy-input-label"><span>🏆</span> Plat</div>
            <input type="number" id="f-plat" value="1" min="0" max="1">
          </div>
          <div class="trophy-input-group">
            <div class="trophy-input-label"><span>🥇</span> Gold</div>
            <input type="number" id="f-gold" value="0" min="0">
          </div>
          <div class="trophy-input-group">
            <div class="trophy-input-label"><span>🥈</span> Silver</div>
            <input type="number" id="f-silver" value="0" min="0">
          </div>
          <div class="trophy-input-group">
            <div class="trophy-input-label"><span>🥉</span> Bronze</div>
            <input type="number" id="f-bronze" value="0" min="0">
          </div>
        </div>
      </div>
      <div class="form-group full">
        <label>Completion Progress: <span id="slider-display">0%</span></label>
        <div class="slider-group">
          <input type="range" id="f-progress" min="0" max="100" value="0"
            oninput="document.getElementById('slider-display').textContent=this.value+'%'">
          <span class="slider-val" id="slider-display2"></span>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>PSNProfiles URL</label>
          <input type="url" id="f-psn" placeholder="https://psnprofiles.com/...">
        </div>
        <div class="form-group">
          <label>PowerPyx URL</label>
          <input type="url" id="f-ppyx" placeholder="https://powerpyx.com/...">
        </div>
      </div>
      <div class="form-group full">
        <label>Notes</label>
        <textarea id="f-notes" placeholder="Missables, tips, where you're up to..."></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save" onclick="saveGame()">Save Game</button>
    </div>
  </div>
</div>

<script>
  // ─── STATE ─────────────────────────────────────────────────────────────────
  let games = JSON.parse(localStorage.getItem('pt-games') || '[]');
  let currentFilter = 'all';
  let editingId = null;

  const DIFF_LABELS = {
    'easy': 'Easy',
    'medium': 'Medium',
    'hard': 'Hard',
    'very-hard': 'Very Hard'
  };

  const GAME_EMOJIS = ['🎮','⚔️','🔫','🏰','🚀','🐉','🗡️','🌍','🤖','👾','🦸','🎯'];

  function genId() { return Date.now().toString(36) + Math.random().toString(36).slice(2); }

  function save() { localStorage.setItem('pt-games', JSON.stringify(games)); }

  // ─── RENDER ─────────────────────────────────────────────────────────────────
  function getStatus(g) {
    if (g.progress >= 100) return 'platted';
    if (g.progress > 0) return 'in-progress';
    return 'not-started';
  }

  function render() {
    const grid = document.getElementById('game-grid');
    let filtered = games;
    if (currentFilter !== 'all') {
      filtered = games.filter(g => getStatus(g) === currentFilter);
    }

    // Stats
    const total = games.length;
    const platted = games.filter(g => g.progress >= 100).length;
    document.getElementById('stat-platted').textContent = platted;
    document.getElementById('stat-total').textContent = total;

    const pct = total === 0 ? 0 : Math.round((platted / total) * 100);
    document.getElementById('overview-fill').style.width = pct + '%';
    document.getElementById('overview-pct').textContent = `${platted} / ${total} platted`;

    if (filtered.length === 0) {
      grid.innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">🏆</div>
          <div class="empty-title">${currentFilter === 'all' ? 'No games yet' : 'No games here'}</div>
          <div class="empty-sub">${currentFilter === 'all' ? 'Add your first game to get started' : 'Try a different filter'}</div>
        </div>`;
      return;
    }

    grid.innerHTML = filtered.map((g, i) => {
      const status = getStatus(g);
      const isPlatted = status === 'platted';
      const emoji = g.emoji || GAME_EMOJIS[i % GAME_EMOJIS.length];
      const diffClass = `diff-${g.difficulty}`;
      const diffLabel = DIFF_LABELS[g.difficulty] || g.difficulty;

      const psnLink = g.psnUrl
        ? `<a href="${g.psnUrl}" target="_blank" class="guide-link psn">📋 PSNProfiles</a>`
        : `<span class="guide-link" style="opacity:0.35;cursor:default">📋 PSNProfiles</span>`;

      const ppyxLink = g.ppyxUrl
        ? `<a href="${g.ppyxUrl}" target="_blank" class="guide-link ppyx">⚡ PowerPyx</a>`
        : `<span class="guide-link" style="opacity:0.35;cursor:default">⚡ PowerPyx</span>`;

      const statusLabel = {
        'platted': '🏆 Platted',
        'in-progress': '▶ In Progress',
        'not-started': '○ Not Started'
      }[status];

      const statusClass = {
        'platted': 'status-platted',
        'in-progress': 'status-in-progress',
        'not-started': 'status-not-started'
      }[status];

      const pctClass = g.progress >= 100 ? ' done' : '';

      const totalTrophies = (g.plat||0) + (g.gold||0) + (g.silver||0) + (g.bronze||0);

      return `
      <div class="game-card ${isPlatted ? 'platted' : ''}" style="animation-delay:${i * 0.05}s">
        <div class="card-accent"></div>
        <div class="card-header">
          <div class="game-thumb">
            ${emoji}
            ${isPlatted ? '<div class="plat-crown">🏆</div>' : ''}
          </div>
          <div class="card-title-area">
            <div class="game-title" title="${g.title}">${g.title}</div>
            <div class="game-meta">
              <span class="badge ${diffClass}">${diffLabel}</span>
              ${g.time ? `<span class="time-badge">⏱ ${g.time}</span>` : ''}
            </div>
          </div>
        </div>
        <div class="card-body">
          ${totalTrophies > 0 ? `
          <div class="trophy-row">
            ${g.plat ? `<span class="trophy-count t-plat"><span class="trophy-icon">🏆</span>${g.plat}</span>` : ''}
            ${g.gold ? `<span class="trophy-count t-gold"><span class="trophy-icon">🥇</span>${g.gold}</span>` : ''}
            ${g.silver ? `<span class="trophy-count t-silver"><span class="trophy-icon">🥈</span>${g.silver}</span>` : ''}
            ${g.bronze ? `<span class="trophy-count t-bronze"><span class="trophy-icon">🥉</span>${g.bronze}</span>` : ''}
          </div>` : ''}
          <div class="progress-area">
            <div class="progress-header">
              <span class="progress-label">Completion</span>
              <span class="progress-pct${pctClass}">${g.progress}%</span>
            </div>
            <div class="progress-track">
              <div class="progress-fill" style="width:${g.progress}%"></div>
            </div>
          </div>
          ${g.notes ? `<div style="font-size:12px;color:var(--text-faint);margin-bottom:12px;border-left:2px solid var(--border);padding-left:10px;line-height:1.5;">${g.notes}</div>` : ''}
          <div class="card-divider"></div>
          <div class="guide-links">
            ${psnLink}
            ${ppyxLink}
          </div>
        </div>
        <div class="card-footer">
          <span class="card-status ${statusClass}">${statusLabel}</span>
          <div class="card-actions">
            <button class="action-btn edit-btn" onclick="openEditModal('${g.id}')">Edit</button>
            <button class="action-btn del-btn" onclick="deleteGame('${g.id}')">✕</button>
          </div>
        </div>
      </div>`;
    }).join('');
  }

  // ─── FILTER ─────────────────────────────────────────────────────────────────
  function setFilter(f) {
    currentFilter = f;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    event.target.classList.add('active');
    render();
  }

  // ─── MODAL ─────────────────────────────────────────────────────────────────
  function openAddModal() {
    editingId = null;
    document.getElementById('modal-title').textContent = 'Add Game';
    clearForm();
    document.getElementById('modal').classList.add('open');
  }

  function openEditModal(id) {
    const g = games.find(x => x.id === id);
    if (!g) return;
    editingId = id;
    document.getElementById('modal-title').textContent = 'Edit Game';
    document.getElementById('f-title').value = g.title || '';
    document.getElementById('f-diff').value = g.difficulty || 'medium';
    document.getElementById('f-time').value = g.time || '';
    document.getElementById('f-plat').value = g.plat ?? 1;
    document.getElementById('f-gold').value = g.gold ?? 0;
    document.getElementById('f-silver').value = g.silver ?? 0;
    document.getElementById('f-bronze').value = g.bronze ?? 0;
    document.getElementById('f-progress').value = g.progress || 0;
    document.getElementById('slider-display').textContent = (g.progress || 0) + '%';
    document.getElementById('f-psn').value = g.psnUrl || '';
    document.getElementById('f-ppyx').value = g.ppyxUrl || '';
    document.getElementById('f-notes').value = g.notes || '';
    document.getElementById('modal').classList.add('open');
  }

  function closeModal() {
    document.getElementById('modal').classList.remove('open');
    editingId = null;
  }

  function handleOverlayClick(e) {
    if (e.target === document.getElementById('modal')) closeModal();
  }

  function clearForm() {
    ['f-title','f-time','f-psn','f-ppyx','f-notes'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('f-diff').value = 'medium';
    document.getElementById('f-plat').value = 1;
    document.getElementById('f-gold').value = 0;
    document.getElementById('f-silver').value = 0;
    document.getElementById('f-bronze').value = 0;
    document.getElementById('f-progress').value = 0;
    document.getElementById('slider-display').textContent = '0%';
  }

  function saveGame() {
    const title = document.getElementById('f-title').value.trim();
    if (!title) { document.getElementById('f-title').focus(); return; }

    const data = {
      title,
      difficulty: document.getElementById('f-diff').value,
      time: document.getElementById('f-time').value.trim(),
      plat: parseInt(document.getElementById('f-plat').value) || 0,
      gold: parseInt(document.getElementById('f-gold').value) || 0,
      silver: parseInt(document.getElementById('f-silver').value) || 0,
      bronze: parseInt(document.getElementById('f-bronze').value) || 0,
      progress: parseInt(document.getElementById('f-progress').value) || 0,
      psnUrl: document.getElementById('f-psn').value.trim(),
      ppyxUrl: document.getElementById('f-ppyx').value.trim(),
      notes: document.getElementById('f-notes').value.trim(),
    };

    if (editingId) {
      const idx = games.findIndex(g => g.id === editingId);
      if (idx !== -1) {
        games[idx] = { ...games[idx], ...data };
      }
    } else {
      data.id = genId();
      data.emoji = GAME_EMOJIS[games.length % GAME_EMOJIS.length];
      games.push(data);
    }

    save();
    closeModal();
    render();
  }

  function deleteGame(id) {
    if (!confirm('Remove this game from your tracker?')) return;
    games = games.filter(g => g.id !== id);
    save();
    render();
  }

  // ─── SEED DATA (first load) ────────────────────────────────────────────────
  if (games.length === 0) {
    const seed = [
      { title: "God of War Ragnarök", difficulty: "medium", time: "40-50 hrs", plat: 1, gold: 5, silver: 12, bronze: 18, progress: 65, psnUrl: "https://psnprofiles.com/trophies/17764-god-of-war-ragnarok", ppyxUrl: "https://www.powerpyx.com/god-of-war-ragnarok-trophy-guide-roadmap/", notes: "Up to Chapter 9. Need to clean up collectibles.", emoji: "⚔️" },
      { title: "Spider-Man 2", difficulty: "easy", time: "20-25 hrs", plat: 1, gold: 4, silver: 8, bronze: 30, progress: 30, psnUrl: "https://psnprofiles.com/trophies/22844-marvels-spider-man-2", ppyxUrl: "https://www.powerpyx.com/marvels-spider-man-2-trophy-guide-roadmap/", notes: "Started playthrough 1. Do side missions before finishing story.", emoji: "🕷️" },
      { title: "Elden Ring", difficulty: "hard", time: "60-80 hrs", plat: 1, gold: 2, silver: 7, bronze: 44, progress: 0, psnUrl: "https://psnprofiles.com/trophies/14849-elden-ring", ppyxUrl: "https://www.powerpyx.com/elden-ring-trophy-guide-roadmap/", notes: "", emoji: "🐉" },
    ];
    seed.forEach(g => { g.id = genId(); games.push(g); });
    save();
  }

  render();
</script>
</body>
</html>
